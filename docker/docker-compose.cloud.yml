version: '3.9'

services:
  # ── API (Arbitrage Engine) ───────────────────────────────────────────
  adrion-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adrion-api
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/arbitrage.db
      - LLM_BACKEND=${LLM_BACKEND:-openrouter}
    expose:
      - "8001"
    volumes:
      - adrion_data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/arbitrage/status', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Dashboard (DEGRADED MODE - no Docker socket on cloud) ────────────
  adrion-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adrion-dashboard
    command: ["python", "server.py"]
    env_file:
      - .env
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=9000
      - DB_PATH=/app/data/arbitrage.db
      - DISABLE_DOCKER_INSPECT=true
    expose:
      - "9000"
    volumes:
      - adrion_data:/app/data
    depends_on:
      adrion-api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/api/system/info', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ── Loki (Log Aggregation) ──────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.1
    container_name: adrion-loki
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Promtail (Log Forwarder - no Docker socket) ──────────────────────
  promtail:
    image: grafana/promtail:3.1.1
    container_name: adrion-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - ./.runtime:/var/log/adrion-runtime:ro
      - promtail_positions:/tmp
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ── Grafana (Dashboards + Alerting) ──────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.4
    container_name: adrion-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-adrion369}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      alert-handler:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Alert Handler (Webhook Sink) ────────────────────────────────────
  alert-handler:
    build:
      context: .
      dockerfile: Dockerfile.alert-handler
    container_name: adrion-alert-handler
    env_file:
      - .env
    environment:
      - HANDLER_PORT=8090
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PAGERDUTY_KEY=${PAGERDUTY_KEY:-}
      - ALERT_LOG_PATH=/app/logs/alerts.log
    volumes:
      - ./monitoring/alerts:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Backup Service ──────────────────────────────────────────────────
  adrion-backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: adrion-backup
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/arbitrage.db
      - BACKUP_DIR=/backups
      - ALERT_URL=http://alert-handler:8090/alert
      - ALERT_SEVERITY=info
    volumes:
      - adrion_data:/app/data:ro
      - ./backups:/backups
    depends_on:
      alert-handler:
        condition: service_healthy
    restart: unless-stopped

  # ── Nginx (Reverse Proxy + TLS Termination) ──────────────────────────
  adrion-nginx:
    image: nginx:1.27-alpine
    container_name: adrion-nginx
    environment:
      - NGINX_SERVER_NAME=${NGINX_SERVER_NAME:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./config/nginx/certs:/etc/nginx/certs:ro
    command: >
      /bin/sh -c
      "envsubst '}NGINX_SERVER_NAME' < /etc/nginx/nginx.conf.template > /tmp/nginx.conf
       && nginx -c /tmp/nginx.conf -g 'daemon off;'"
    depends_on:
      adrion-api:
        condition: service_healthy
      adrion-dashboard:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/api/arbitrage/status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

volumes:
  adrion_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  promtail_positions:
    driver: local
