repos:
  # ── Local: Sync instruction contracts ───────────────────────────────────────
  - repo: local
    hooks:
      - id: sync-repo-context-contract
        name: sync-repo-context-contract
        entry: python scripts/reporting/sync_repo_context_contract.py
        language: system
        pass_filenames: false
        - id: sync-version-state
          name: sync version state
          entry: python scripts/reporting/sync_version_state.py
          language: system
          pass_filenames: false
        - id: validate-repo-context-status
          name: validate repo context status
          entry: python scripts/reporting/validate_repo_context_status.py
          language: system
          pass_filenames: false
        - id: validate-mcp-structure
          name: validate mcp structure
          entry: python scripts/reporting/validate_mcp_structure.py
          language: system
          pass_filenames: false
        files: ^(\.github/copilot-instructions\.md|CLAUDE\.md)$

  # ── Python: Ruff (linting + formatting) ──────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--select=E,F,W, --ignore=E501, --fix]
      - id: ruff-format
        args: [--line-length=100]

  # ── Python: Basic checks ──────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch=main, --branch=master]

  # ── Go: Formatting ────────────────────────────────────────────────────────────
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet

  # ── Secrets detection ─────────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: \.secrets\.baseline|\.env\.example|\.env\.sample

  # ── Python: mypy type checking ────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional]
        files: ^arbitrage/
