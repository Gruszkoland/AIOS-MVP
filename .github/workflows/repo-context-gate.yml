name: repo-context-gate

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  validate-repo-context:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate REPO_CONTEXT_STATUS and version alignment
        run: |
          python scripts/reporting/validate_repo_context_status.py

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets

      - name: Validate secrets baseline exists
        run: test -f .secrets.baseline

      - name: Run detect-secrets audit against baseline
        run: |
          detect-secrets scan --baseline .secrets.baseline
