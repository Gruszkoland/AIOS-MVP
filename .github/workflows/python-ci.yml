name: ADRION 369 Python CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-arbitrage.txt
          pip install pytest pytest-cov

      - name: Run Tests
        run: |
          python -m pytest tests/test_oracle.py tests/test_quantum.py tests/test_database.py tests/test_mass_generator.py tests/test_smoke.py --cov=arbitrage --cov-report=xml --cov-fail-under=25
