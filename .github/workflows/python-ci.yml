name: ADRION 369 Python CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-arbitrage.txt
          pip install pytest pytest-cov ruff mypy

      - name: Lint (ruff)
        run: ruff check arbitrage/ tests/ --select=E,F,W --ignore=E501

      - name: Type check (mypy)
        run: mypy arbitrage/ --ignore-missing-imports --no-strict-optional

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=arbitrage \
            --cov=uap \
            --cov=internal \
            --cov-report=xml:tests/results/coverage.xml \
            --cov-report=json:tests/results/coverage.json \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --ignore=tests/security_simulation.py \
            -m "not e2e and not runtime" \
            -v --tb=short

      - name: Check TIER 0 Critical Tests
        run: |
          python -m pytest tests/ -m "tier0" -v --tb=short
          echo "TIER 0 tests passed"

      - name: Validate Guardian Law Compliance
        run: |
          echo "Validating Guardian Laws (G1-G9) in codebase..."
          grep -r "G1.*Unity\|G2.*Harmony\|G7.*Privacy" arbitrage/ || echo "Warning: Guardian Laws not fully tagged"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: tests/results/

      - name: Run UAP tests
        env:
          UAP_API_KEY: test-key-ci
          ENVIRONMENT: testing
          JWT_SECRET: test-jwt-secret-ci
        run: |
          cd uap
          pip install -r requirements.txt 2>/dev/null || true
          pytest tests/ -v --tb=short
