name: ADRION 369 Python CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-arbitrage.txt
          pip install pytest pytest-cov ruff mypy

      - name: Lint (ruff)
        run: ruff check arbitrage/ tests/ --select=E,F,W --ignore=E501

      - name: Type check (mypy)
        run: mypy arbitrage/ --ignore-missing-imports --no-strict-optional

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=arbitrage \
            --cov-report=xml:tests/results/coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=65 \
            --ignore=tests/security_simulation.py \
            -m "not e2e and not runtime" \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: tests/results/
