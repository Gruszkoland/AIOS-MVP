name: Deploy to VPS

on:
    push:
        branches: [master]
    workflow_dispatch:
        inputs:
            service:
                description: "Docker service to restart (leave empty = full deploy)"
                required: false
                default: ""

concurrency:
    group: deploy-vps
    cancel-in-progress: false

jobs:
    deploy:
        name: Deploy → 178.105.59.41
        runs-on: ubuntu-latest
        environment: production

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup SSH
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

            - name: Add VPS to known_hosts
              run: |
                  ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

            - name: Deploy — pull & restart
              env:
                  SERVICE: ${{ github.event.inputs.service }}
              run: |
                  ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'ENDSSH'
                    set -e
                    cd /opt/adrion-system

                    echo "📥 Pulling latest changes..."
                    git pull origin master

                    if [ -z "$SERVICE" ]; then
                      echo "🚀 Full deploy: docker compose up -d"
                      docker compose -f docker-compose.prod.yml up -d --remove-orphans
                    else
                      echo "♻️  Restarting service: $SERVICE"
                      docker compose -f docker-compose.prod.yml restart $SERVICE
                    fi

                    echo "✅ Health check..."
                    sleep 5
                    docker compose -f docker-compose.prod.yml ps
                  ENDSSH

            - name: Notify success
              if: success()
              run: echo "✅ Deploy zakończony pomyślnie — $(date '+%Y-%m-%d %H:%M:%S')"

            - name: Notify failure
              if: failure()
              run: echo "❌ Deploy FAILED — sprawdź logi powyżej"
