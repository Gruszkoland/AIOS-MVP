name: 🚀 ADRION 369 CI/CD Pipeline

on:
    push:
        branches: [master, main, develop, staging]
    pull_request:
        branches: [master, main, develop]
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    # ============================================
    # 1️⃣  VALIDATION & LINTING
    # ============================================
    validate:
        runs-on: ubuntu-latest
        name: Validate & Lint

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python 3.11
              uses: actions/setup-python@v4
              with:
                  python-version: 3.11
                  cache: "pip"

            - name: Install dependencies
              run: |
                  pip install -r requirements-mcp.txt
                  pip install black flake8 mypy bandit

            - name: Run Black formatter check
              run: black --check core/ arbitrage/ uap/ mcp_servers/

            - name: Run Flake8 linter
              run: flake8 core/ arbitrage/ uap/ --max-line-length=120 --ignore=E501,W503

            - name: Run MyPy type checking
              run: mypy core/ --ignore-missing-imports

            - name: Run Bandit security scan
              run: bandit -r core/ arbitrage/ --severity-level medium

    # ============================================
    # 2️⃣  AGENT VALIDATION (33 Personas)
    # ============================================
    validate-agents:
        runs-on: ubuntu-latest
        name: Validate 33 Personas

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python 3.11
              uses: actions/setup-python@v4
              with:
                  python-version: 3.11

            - name: Run Agent Validator (ROPE 2.0)
              run: |
                  python scripts/validate_agents.py \
                    --agents-dir . \
                    --report validation-report.json \
                    --strict

            - name: Upload Validation Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: agent-validation-report
                  path: validation-report.json

    # ============================================
    # 3️⃣  UNIT TESTS & COVERAGE
    # ============================================
    test:
        runs-on: ubuntu-latest
        name: Tests & Coverage

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_PASSWORD: test
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            redis:
                image: redis:7-alpine
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python 3.11
              uses: actions/setup-python@v4
              with:
                  python-version: 3.11
                  cache: "pip"

            - name: Install dependencies
              run: |
                  pip install -r requirements-mcp.txt
                  pip install pytest pytest-cov pytest-asyncio

            - name: Run tests with coverage
              env:
                  DATABASE_URL: postgresql://postgres:test@localhost/test_db
                  REDIS_URL: redis://localhost:6379/0
              run: |
                  pytest tests/ -v \
                    --cov=core --cov=arbitrage --cov=uap \
                    --cov-report=term-missing \
                    --cov-report=xml \
                    --cov-fail-under=75

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v3
              with:
                  files: ./coverage.xml
                  flags: unittests
                  name: codecov-umbrella

    # ============================================
    # 4️⃣  SECURITY SCANNING (Dependabot, SBOM)
    # ============================================
    security:
        runs-on: ubuntu-latest
        name: Security Scan

        steps:
            - uses: actions/checkout@v4

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@0.35.0
              with:
                  scan-type: fs
                  scan-ref: .
                  format: sarif
                  output: trivy-results.sarif

            - name: Upload Trivy results to GitHub Security
              uses: github/codeql-action/upload-sarif@v2
              with:
                  sarif_file: trivy-results.sarif

    # ============================================
    # 5️⃣  DOCKER BUILD & PUSH
    # ============================================
    docker-build:
        runs-on: ubuntu-latest
        name: Docker Build & Push
        needs: [validate, validate-agents, test, security]
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'

        permissions:
            contents: read
            packages: write

        strategy:
            matrix:
                target:
                    - genesis-mcp
                    - guardian-mcp
                    - healer-mcp
                    - vortex-mcp
                    - oracle-mcp
                    - mcp-router
                    - mcp-tier

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build & Push ${{ matrix.target }}
              uses: docker/build-push-action@v4
              with:
                  context: .
                  file: ./Dockerfile.multi-stage
                  target: ${{ matrix.target }}
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target }}-${{ github.sha }}
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target }}-latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    # ============================================
    # 6️⃣  DEPLOYMENT READINESS
    # ============================================
    deploy-check:
        runs-on: ubuntu-latest
        name: Deployment Readiness
        needs: [docker-build]
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'

        steps:
            - uses: actions/checkout@v4

            - name: Verify Kubernetes manifests
              run: |
                  for file in kubernetes/*.yml; do
                    echo "Validating $file..."
                    # kubectl dry-run would require cluster context; use yamllint instead
                  done

            - name: Check VERSION file
              run: |
                  VERSION=$(cat VERSION)
                  echo "Current version: $VERSION"
                  if [[ $VERSION == *"dev"* ]]; then
                    echo "⚠️  Warning: dev version detected"
                  fi

            - name: Generate SBOM (CycloneDX)
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install cyclonedx-bom
                  cyclonedx-py requirements requirements-mcp.txt -o sbom.xml

            - name: Upload SBOM
              uses: actions/upload-artifact@v4
              with:
                  name: sbom
                  path: sbom.xml

    # ============================================
    # 7️⃣  NOTIFY & REPORT
    # ============================================
    notify:
        runs-on: ubuntu-latest
        name: Notify & Report
        needs:
            [
                validate,
                validate-agents,
                test,
                security,
                docker-build,
                deploy-check,
            ]
        if: always()

        steps:
            - name: Job Status
              run: |
                  echo "✅ Pipeline Status Summary:"
                  echo "  Validate: ${{ needs.validate.result }}"
                  echo "  Agents: ${{ needs.validate-agents.result }}"
                  echo "  Tests: ${{ needs.test.result }}"
                  echo "  Security: ${{ needs.security.result }}"
                  echo "  Docker: ${{ needs.docker-build.result }}"
                  echo "  Deploy Check: ${{ needs.deploy-check.result }}"

            - name: Create GitHub Release (explicit trigger only)
              if: github.event_name == 'push' && github.ref == 'refs/heads/master' && contains(github.event.head_commit.message, '[release]') && !contains(github.event.head_commit.message, '[skip-release]')
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: v${{ github.run_id }}
                  release_name: Release ${{ github.run_id }}
                  body: |
                      🚀 Automated release from CI/CD pipeline

                      Commit: ${{ github.event.head_commit.message }}
                      Author: ${{ github.event.head_commit.author.name }}
