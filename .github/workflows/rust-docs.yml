name: Rust Docs (cargo doc → GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}

      - name: Build docs (no deps, all features)
        run: |
          cargo doc \
            --workspace \
            --no-deps \
            --document-private-items \
            -p aios-kernel \
            -p aios-ipc \
            -p aios-agents

      - name: Add redirect index.html
        run: |
          cat > target/doc/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>AIOS-MVP Docs</title>
            <meta http-equiv="refresh" content="0; url=aios_kernel/index.html">
          </head>
          <body>
            <p>Redirecting to <a href="aios_kernel/index.html">aios_kernel docs</a>...</p>
            <ul>
              <li><a href="aios_kernel/index.html">aios-kernel — 162D decision topology</a></li>
              <li><a href="aios_ipc/index.html">aios-ipc — zero-copy ring buffer</a></li>
              <li><a href="aios_agents/index.html">aios-agents — cognitive agent swarm</a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
