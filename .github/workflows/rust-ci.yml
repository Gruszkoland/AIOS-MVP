name: Rust CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # Stage 0: Supply chain security
  deny:
    name: Dependency audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1
        with:
          log-level: warn
          command: check
          arguments: --all-features

  # Stage 1: Lint & Format
  lint:
    name: Lint (rustfmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting (rustfmt)
        run: cargo fmt --all -- --check

      - name: Lint with clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # Stage 2: Build & Test
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace (debug)
        run: cargo build --workspace --verbose --locked

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Build workspace (release)
        run: cargo build --workspace --release

  # Stage 3: Coverage (80%+ gate)
  coverage:
    name: Code Coverage (80%+ gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage (tarpaulin)
        run: cargo tarpaulin --workspace --timeout 300 --out Xml --output-dir target/coverage

      - name: Check coverage >= 80%
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/coverage/cobertura.xml')
          root = tree.getroot()
          coverage = float(root.attrib.get('line-rate', 0)) * 100
          print(f"Code coverage: {coverage:.1f}%")
          if coverage < 80:
            print(f"ERROR: Coverage {coverage:.1f}% < 80% threshold")
            exit(1)
          print("✓ Coverage gate passed")
          EOF

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./target/coverage/cobertura.xml
          fail_ci_if_error: false

  # Stage 4: Benchmarks (baseline)
  benchmarks:
    name: Benchmarks (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run benchmarks (smoke)
        run: cargo bench --workspace --no-run

      - name: Run IPC ring buffer benchmark
        run: cargo bench -p ipc --bench ring_buffer_throughput 2>&1 | tee benchmark.txt

      - name: Run agent latency benchmark
        continue-on-error: true
        run: cargo bench -p agents --bench agent_latency 2>&1 | tee -a benchmark.txt

      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.txt

  # Stage 5: Guardian Laws Compliance Check
  guardian-laws:
    name: Guardian Laws Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify no unsafe code violations
        run: |
          # Check that all unsafe blocks have SAFETY comments
          unsafe_count=$(grep -r "unsafe" --include="*.rs" kernel/ migration_batches/batch2/to-architecture/agents/ ipc/ migration_batches/batch1/review-bucket/poc/ | grep -v "SAFETY:" | wc -l || true)
          if [ $unsafe_count -gt 0 ]; then
            echo "ERROR: Found unsafe blocks without SAFETY comments:"
            grep -rn "unsafe" --include="*.rs" kernel/ migration_batches/batch2/to-architecture/agents/ ipc/ migration_batches/batch1/review-bucket/poc/ | grep -v "SAFETY:"
            exit 1
          fi
          echo "✓ All unsafe blocks have SAFETY comments"

      - name: Verify Guardian Laws constants
        run: |
          # Ensure docs/GUARDIAN_LAWS_CANONICAL.json exists
          if [ ! -f docs/GUARDIAN_LAWS_CANONICAL.json ]; then
            echo "WARN: docs/GUARDIAN_LAWS_CANONICAL.json not found (optional for PoC)"
          else
            echo "✓ Guardian Laws canonical reference found"
          fi


  # Stage 6: Memory safety (miri)
  miri:
    name: Memory Safety (cargo miri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Run miri on kernel
        run: cargo +nightly miri test -p aios-kernel
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"

      - name: Run miri on ipc
        run: cargo +nightly miri test -p aios-ipc
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"

  # Gate: All checks must pass
  all-checks:
    name: All Checks Complete
    runs-on: ubuntu-latest
    needs: [ deny, lint, build-test, coverage, miri, benchmarks, guardian-laws ]
    if: always()
    steps:
      - name: Check if all jobs passed
        run: |
          if [ "${{ needs.deny.result }}" != "success" ] || \
             [ "${{ needs.miri.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.build-test.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "❌ CI pipeline failed"
            exit 1
          fi
          echo "✅ CI pipeline passed"
