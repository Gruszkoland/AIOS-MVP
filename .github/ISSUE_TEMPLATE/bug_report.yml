name: Bug Report
description: Report a bug in ADRION 369
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: input
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      placeholder: "e.g. arbitrage/guardian.py, Go Vortex, UAP orchestrator, CI pipeline"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant logs or stack traces.
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - LOW — cosmetic / minor inconvenience
        - MEDIUM — broken feature, workaround exists
        - HIGH — broken feature, no workaround
        - CRITICAL — security issue or data loss
    validations:
      required: true

  - type: dropdown
    id: guardian-law
    attributes:
      label: Guardian Law violated (if applicable)
      description: Does this bug violate any Guardian Law?
      multiple: true
      options:
        - None
        - G1 Unity
        - G2 Harmony
        - G3 Rhythm
        - G4 Causality
        - G5 Transparency
        - G6 Authenticity
        - G7 Privacy (CRITICAL)
        - G8 Nonmaleficence (CRITICAL)
        - G9 Sustainability
