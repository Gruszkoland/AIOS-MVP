auth_enabled: false

server:
  http_listen_port: 3100
  log_level: info

ingester:
  max_chunk_age: 1h
  chunk_encoding: snappy

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h

schema_config:
  configs:
    - from: 2020-10-24
      object_store: filesystem
      store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks
