services:
  adrion-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adrion-api
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/arbitrage.db
      - LLM_BACKEND=${LLM_BACKEND:-auto}
    expose:
      - "8001"
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/arbitrage/status', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  adrion-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adrion-dashboard
    command: ["python", "server.py"]
    env_file:
      - .env
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=9000
      - OLLAMA_URL=http://host.docker.internal:11434
      - DB_PATH=/app/data/arbitrage.db
      - STACK_CONTAINERS=adrion-api,adrion-dashboard
      - MONITORING_CONTAINERS=adrion-loki,adrion-promtail,adrion-grafana
      - DISABLE_DOCKER_INSPECT=true
    expose:
      - "9000"
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    depends_on:
      adrion-api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/api/system/info', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  loki:
    image: grafana/loki:3.1.1
    container_name: adrion-loki
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  promtail:
    image: grafana/promtail:3.1.1
    container_name: adrion-promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - ./.runtime:/var/log/adrion-runtime:ro
      - promtail-positions:/tmp
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: adrion-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-adrion369}
      - GRAFANA_ALERT_WEBHOOK_URL=${GRAFANA_ALERT_WEBHOOK_URL:-http://alert-handler:8090/alert}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      alert-handler:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Alert Handler (Slack/Pagerduty/Webhook Integration) ────────────────
  alert-handler:
    build:
      context: .
      dockerfile: Dockerfile.alert-handler
    container_name: adrion-alert-handler
    env_file:
      - .env
    environment:
      - HANDLER_PORT=8090
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PAGERDUTY_KEY=${PAGERDUTY_KEY:-}
      - ALERT_LOG_PATH=/app/logs/alerts.log
    ports:
      - "8090:8090"
    volumes:
      - ./monitoring/alerts:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  adrion-backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: adrion-backup
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/arbitrage.db
      - BACKUP_DIR=/backups
      - ALERT_URL=http://alert-handler:8090/alert
      - ALERT_SEVERITY=info
    volumes:
      - ./data:/app/data:ro
      - ./backups:/backups
      - ./scripts/backups/backup-sqlite.sh:/usr/local/bin/backup-sqlite.sh:ro
    depends_on:
      alert-handler:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  # ── Nginx Reverse Proxy (TLS termination, single entry-point) ─────────────
  adrion-nginx:
    image: nginx:1.27-alpine
    container_name: adrion-nginx
    env_file:
      - .env
    environment:
      - NGINX_SERVER_NAME=${NGINX_SERVER_NAME:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./config/nginx/certs:/etc/nginx/certs:ro
    # envsubst substitutes ${NGINX_SERVER_NAME} at container start
    command: >
      /bin/sh -c
      "envsubst '$$NGINX_SERVER_NAME' < /etc/nginx/nginx.conf.template > /tmp/nginx.conf
       && nginx -c /tmp/nginx.conf -g 'daemon off;'"
    depends_on:
      adrion-api:
        condition: service_healthy
      adrion-dashboard:
        condition: service_healthy
      adrion-uap:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/api/arbitrage/status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  # ── UAP Master Orchestrator API ───────────────────────────────────────────
  adrion-uap:
    build:
      context: uap
      dockerfile: Dockerfile
    container_name: adrion-uap
    command: ["python", "backend/api.py"]
    env_file:
      - .env
    environment:
      - MAPI_HOST=0.0.0.0
      - MAPI_PORT=8002
    expose:
      - "8002"
    depends_on:
      adrion-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/mapi/v1/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Prometheus Metrics Collector ──────────────────────────────────────────
  adrion-prometheus:
    image: prom/prometheus:v2.51.0
    container_name: adrion-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── PostgreSQL Metrics Exporter ───────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: adrion-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/adrion?sslmode=disable}
    expose:
      - "9187"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9187/metrics"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.1"

volumes:
  loki-data:
  grafana-data:
  promtail-positions:
