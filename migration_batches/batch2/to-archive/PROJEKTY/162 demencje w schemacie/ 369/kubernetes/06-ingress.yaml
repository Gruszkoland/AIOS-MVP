---
# ADRION 369 — Kubernetes Ingress
# Expose Frontend i Backend za HTTPS
# Wymaga Ingress Controller (nginx-ingress, traefik, etc.)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adrion-ingress
  namespace: adrion
  annotations:
    kubernetes.io/ingress.class: "nginx"  # Ingress Controller
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # Automatic SSL (if cert-manager enabled)
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-XSS-Protection: 1; mode=block";

spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - adrion.example.com  # ← ZMIEŃ na swój domain
    secretName: adrion-tls  # Automatycznie tworzone przez cert-manager
  rules:
  - host: adrion.example.com  # ← ZMIEŃ
    http:
      paths:
      # Frontend (root)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: uap-frontend
            port:
              number: 8003

      # Backend API
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: uap-backend
            port:
              number: 8002

      - path: /mapi
        pathType: Prefix
        backend:
          service:
            name: uap-backend
            port:
              number: 8002

      # Metrics (expose Prometheus metrics)
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: uap-backend
            port:
              number: 9090

---
# Optional: Certificate Issuer dla Let's Encrypt
# Wymaga zainstalowania cert-manager: https://cert-manager.io/docs/installation/
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com  # ← ZMIEŃ
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - http01:
        ingress:
          class: nginx
