# ZAP scan rules configuration
# Format: <rule_id>	IGNORE/WARN/FAIL
# Suppress known false positives for ADRION 369 API

# Content-Type header on JSON API (not applicable)
10021	IGNORE

# X-Content-Type-Options (set by Nginx in prod, not by Flask directly)
10036	IGNORE

# Server header disclosure (handled by Nginx in prod)
10037	IGNORE

# Cache-Control for API responses (JSON APIs don't need strict caching headers)
10049	IGNORE

# CSP header (API-only, no HTML served except /api/docs)
10038	WARN
