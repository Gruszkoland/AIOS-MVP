[pytest]
testpaths = tests, tests/unit, tests/integration, uap/tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=arbitrage
    --cov=uap
    --cov=internal
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=json:coverage.json
    --cov-fail-under=80
    -v
    --tb=short
    --strict-markers
    --ignore=tests/security_simulation.py
    -m "not e2e"

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring external services
    e2e: end-to-end pipeline tests requiring live DB
    runtime: marks tests requiring local runtime services (Ollama, Dashboard, Vortex)
    unit: unit tests (no I/O)
    smoke: smoke tests (fast)
    guardian: guardian law compliance tests
    tier0: TIER 0 critical tests
    crisis: crisis mode tests
    ragas: RAG evaluation tests
