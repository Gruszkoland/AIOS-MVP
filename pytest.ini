[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q
    --ignore=tests/security_simulation.py
    -m "not e2e"
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring external services
    e2e: end-to-end pipeline tests requiring live DB
    runtime: marks tests requiring local runtime services (Ollama, Dashboard, Vortex)
