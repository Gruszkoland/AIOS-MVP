[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q
    --cov=arbitrage
    --cov-report=term-missing
    --cov-fail-under=25
    --ignore=tests/security_simulation.py
    --ignore=tests/test_event_bus.py
    --ignore=tests/test_feedback_split.py
    -m "not e2e"
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring external services
    e2e: end-to-end pipeline tests requiring live DB
