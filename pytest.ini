[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --ignore=tests/integration
    --ignore=tests/mcp

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring external services
    e2e: end-to-end pipeline tests requiring live DB
    runtime: marks tests requiring local runtime services (Ollama, Dashboard, Vortex)
    unit: unit tests (no I/O)
    smoke: smoke tests (fast)
    guardian: guardian law compliance tests
    tier0: TIER 0 critical tests
    crisis: crisis mode tests
    ragas: RAG evaluation tests
