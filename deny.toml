# cargo-deny configuration — supply chain security
# Run: cargo deny check

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
]
deny = ["GPL-3.0", "AGPL-3.0"]
copyleft = "warn"

[advisories]
version = 2
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
