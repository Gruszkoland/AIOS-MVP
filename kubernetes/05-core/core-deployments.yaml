---
# Deployment for N8N (Workflow Orchestration SAP)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: adrion-369
  labels:
    app: n8n
    tier: workflows
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
        tier: workflows
    spec:
      serviceAccountName: adrion-system
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5678
          env:
            - name: N8N_HOST
              value: "0.0.0.0"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "http"
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "genesis_record"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: N8N_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-credentials
                  key: N8N_ADMIN_PASSWORD
          volumeMounts:
            - name: n8n-data
              mountPath: /.n8n
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 5678
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-pvc

---
# PersistentVolumeClaim for N8N
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-pvc
  namespace: adrion-369
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  volumeName: pv-n8n-data
  resources:
    requests:
      storage: 20Gi

---
# Service for N8N
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: adrion-369
  labels:
    app: n8n
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5678
      targetPort: 5678
  selector:
    app: n8n

---
# Deployment for Vortex (174Hz Harmonic Engine)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vortex
  namespace: adrion-369
  labels:
    app: vortex
    tier: harmonic-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vortex
  template:
    metadata:
      labels:
        app: vortex
        tier: harmonic-engine
    spec:
      serviceAccountName: adrion-system
      containers:
        - name: vortex
          image: 162demencjewschemacie369-vortex-engine:latest
          imagePullPolicy: Never # Local build
          ports:
            - name: http
              containerPort: 1740
          env:
            - name: VORTEX_PORT
              value: "1740"
            - name: VORTEX_FREQ
              value: "174"
            - name: DB_HOST
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 1740
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 1740
            initialDelaySeconds: 10
            periodSeconds: 5

---
# Service for Vortex
apiVersion: v1
kind: Service
metadata:
  name: vortex
  namespace: adrion-369
  labels:
    app: vortex
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 1740
      targetPort: 1740
  selector:
    app: vortex

---
# Deployment for ADRION Healer (Self-healing daemon)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healer
  namespace: adrion-369
  labels:
    app: healer
    tier: self-healing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healer
  template:
    metadata:
      labels:
        app: healer
        tier: self-healing
    spec:
      serviceAccountName: adrion-system
      containers:
        - name: healer
          image: 162demencjewschemacie369-adrion-healer:latest
          imagePullPolicy: Never # Local build
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# Deployment for ADRION API (Main arbitrage engine)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: adrion-369
  labels:
    app: api
    tier: arbitrage-engine
spec:
  replicas: 2 # 2 replicas for HA
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        tier: arbitrage-engine
    spec:
      serviceAccountName: adrion-system
      containers:
        - name: api
          image: 162demencjewschemacie369-adrion-api:latest
          imagePullPolicy: Never # Local build
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: DB_HOST
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: OLLAMA_URL
              value: "http://ollama:11434"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/arbitrage/status
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/arbitrage/status
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 5

---
# Service for API (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: adrion-369
  labels:
    app: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  selector:
    app: api

---
# Deployment for Alert Handler
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-handler
  namespace: adrion-369
  labels:
    app: alert-handler
    tier: alerting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-handler
  template:
    metadata:
      labels:
        app: alert-handler
        tier: alerting
    spec:
      serviceAccountName: adrion-system
      containers:
        - name: alert-handler
          image: 162demencjewschemacie369-alert-handler:latest
          imagePullPolicy: Never # Local build
          ports:
            - name: http
              containerPort: 8090
          env:
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: alerting-webhooks
                  key: SLACK_WEBHOOK_URL
            - name: PAGERDUTY_KEY
              valueFrom:
                secretKeyRef:
                  name: alerting-webhooks
                  key: PAGERDUTY_KEY
            - name: DB_HOST
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 5

---
# Service for Alert Handler
apiVersion: v1
kind: Service
metadata:
  name: alert-handler
  namespace: adrion-369
  labels:
    app: alert-handler
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8090
      targetPort: 8090
  selector:
    app: alert-handler
