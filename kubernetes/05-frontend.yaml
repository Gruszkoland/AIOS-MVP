---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uap-frontend
  namespace: adrion
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: uap-frontend
  template:
    metadata:
      labels:
        app: uap-frontend
    spec:
      containers:
      - name: uap-frontend
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        command:
        - python
        - -m
        - http.server
        - "8003"
        - --directory
        - /app/uap/frontend
        ports:
        - containerPort: 8003
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 8003
          initialDelaySeconds: 10
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: uap-frontend
  namespace: adrion
spec:
  type: ClusterIP
  selector:
    app: uap-frontend
  ports:
  - port: 8003
    targetPort: 8003

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uap-frontend-hpa
  namespace: adrion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uap-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
