---
# StorageClass for Local Storage (on-node storage)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
  namespace: adrion-369
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain

---
# StorageClass for Fast SSD storage
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-ssd
  namespace: adrion-369
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
parameters:
  type: ssd

---
# PersistentVolume for PostgreSQL data (100Gi)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-postgres-data
  namespace: adrion-369
  labels:
    app: postgres
    type: database
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  hostPath:
    path: /data/postgres

