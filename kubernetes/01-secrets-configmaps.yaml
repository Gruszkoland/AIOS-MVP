---
# ADRION 369 — Kubernetes Secrets
apiVersion: v1
kind: Secret
metadata:
  name: adrion-secrets
  namespace: adrion
type: Opaque
stringData:
  POSTGRES_USER: adrion
  POSTGRES_PASSWORD: "CHANGE_ME_MIN_32_CHARS_RANDOM"
  POSTGRES_DB: genesis_record
  PG_USER: adrion
  PG_PASSWORD: "CHANGE_ME_MIN_32_CHARS_RANDOM"
  UAP_API_KEY: "CHANGE_ME_MIN_32_CHARS_RANDOM"
  JWT_SECRET: "CHANGE_ME_MIN_32_CHARS_RANDOM"
  DRM_HMAC_SECRET: "CHANGE_ME_MIN_32_CHARS_RANDOM"
  PGADMIN_DEFAULT_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: adrion-config
  namespace: adrion
data:
  ENVIRONMENT: "production"
  DB_ENGINE: "postgresql"
  PG_HOST: "postgres.adrion.svc.cluster.local"
  PG_PORT: "5432"
  MAPI_PORT: "8002"
  LOG_LEVEL: "INFO"
  LLM_BACKEND: "ollama"
  OLLAMA_URL: "http://ollama.adrion.svc.cluster.local:11434"
  DB_POOL_MIN: "5"
  DB_POOL_MAX: "20"
