# Production overrides for ADRION 369 Helm chart

replicaCount: 2

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "10"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: api.adrion369.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: adrion-tls
      hosts:
        - api.adrion369.dev

api:
  resources:
    limits:
      memory: 1Gi
      cpu: "1"
    requests:
      memory: 512Mi
      cpu: "0.5"

env:
  DB_ENGINE: postgres
  LLM_BACKEND: auto
  CORS_ALLOWED_ORIGIN: "https://api.adrion369.dev"

secrets:
  existingSecret: adrion-secrets

monitoring:
  grafana:
    adminPassword: "" # Use existingSecret

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
