---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: adrion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
      - name: pgadmin
        image: dpage/pgadmin4:latest
        ports:
        - containerPort: 80
        env:
        - name: PGADMIN_DEFAULT_EMAIL
          value: "admin@example.com"
        - name: PGADMIN_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: adrion-secrets
              key: PGADMIN_DEFAULT_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: adrion
spec:
  type: ClusterIP
  selector:
    app: pgadmin
  ports:
  - port: 5050
    targetPort: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: uap-backend-pdb
  namespace: adrion
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: uap-backend

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: adrion
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: uap-backend
    ports:
    - protocol: TCP
      port: 5432
