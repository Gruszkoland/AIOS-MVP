---
# ADRION 369 — Kubernetes Storage
# PersistentVolume + PersistentVolumeClaim dla PostgreSQL
# W produkcji: use cloud storage (AWS EBS, GCP Persistent Disk, Azure Disk)

apiVersion: v1
kind: PersistentVolume
metadata:
  name: adrion-postgres-pv
spec:
  capacity:
    storage: 50Gi  # Dostosuj do potrzeb
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: fast  # Musi być zdefiniowana na klastrze
  hostPath:
    path: "/data/adrion/postgres"  # Host path (dla minikube/dev)
    type: DirectoryOrCreate

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: adrion
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast
  resources:
    requests:
      storage: 50Gi

---
# Storage class dla fast storage (SSD)
# Uwaga: Dostosuj do swojego dostawcy chmury
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast
provisioner: kubernetes.io/no-provisioner
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
