worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ── Security headers (G8: Nonmaleficence) ───────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'" always;
    server_tokens off;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format json_log escape=json
        '{"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"duration_ms":$request_time,'
        '"remote_addr":"$remote_addr",'
        '"upstream":"$upstream_addr"}';
    access_log /var/log/nginx/access.log json_log;

    # ── Rate limiting (G8) ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=uap:10m rate=60r/m;

    # ── Upstreams ────────────────────────────────────────────────────────────
    upstream adrion_api {
        server adrion-api:8001;
        keepalive 8;
    }

    upstream adrion_uap {
        server adrion-uap:8002;
        keepalive 4;
    }

    upstream adrion_dashboard {
        server adrion-dashboard:9000;
        keepalive 4;
    }

    # ── Main HTTPS server ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${NGINX_SERVER_NAME};

        # TLS — replace with real certs in production
        # For local dev: use mkcert or a self-signed cert
        ssl_certificate     /etc/nginx/certs/adrion.crt;
        ssl_certificate_key /etc/nginx/certs/adrion.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Arbitrage API (/api/*) ─────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://adrion_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── UAP Master Orchestrator API (/mapi/*) ─────────────────────────
        location /mapi/ {
            limit_req zone=uap burst=20 nodelay;
            proxy_pass         http://adrion_uap;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Dashboard (/) ─────────────────────────────────────────────────
        location / {
            proxy_pass         http://adrion_dashboard;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name ${NGINX_SERVER_NAME};
        return 301 https://$host$request_uri;
    }
}
