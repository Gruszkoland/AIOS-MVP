    check: "Are we safe? Are rights protected? Is future viable?"
    violation_limit: 0  # ABSOLUTE

## Harmonic Aggregation Formulas

aggregation_formulas:
  
  material_arithmetic:
    formula: "(M1 + M2 + M3) / 3"
    use_case: "Pragmatic, real-world scoring"
    characteristic: "All factors equally weighted"
  
  intellectual_harmonic:
    formula: "3 / (1/I1 + 1/I2 + 1/I3)"
    use_case: "Truth scoring (stricter)"
    characteristic: "One weak link pulls entire score down"
    example: "If I1=0.9, I2=0.9, I3=0.1 → Harmonic ≈ 0.26 (not 0.63)"
  
  essential_geometric:
    formula: "(E1 × E2 × E3) ^ (1/3)"
    use_case: "Mission alignment (all-or-nothing)"
    characteristic: "All components must be strong"
    example: "If E1=0.8, E2=0.8, E3=0.1 → Geometric ≈ 0.41 (not 0.57)"

## Balance Scoring

balance_calculation:
  formula: "Balance = 1 - (σ/μ) where σ=std_dev(M,I,E), μ=mean(M,I,E)"
  
  examples:
    - "Perfect balance (M=0.5, I=0.5, E=0.5): σ=0, Balance=1.0"
    - "Good balance (M=0.4, I=0.5, E=0.6): σ≈0.082, μ=0.5, Balance≈0.836"
    - "Poor balance (M=0.1, I=0.5, E=0.9): σ=0.4, μ=0.5, Balance=0.2"
    - "Extreme balance (M=0.1, I=0.9, E=0.1): σ≈0.44, μ=0.37, Balance≈-0.2 (red flag)"

## Decision Thresholds

thresholds:
  
  normal_operations:
