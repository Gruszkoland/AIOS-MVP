    laws: ["G1: Unity", "G2: Harmony", "G3: Rhythm"]
    perspective: "Material"
    check: "Is collective good maintained? System in equilibrium?"
    violation_limit: 1
  
  truth_triad:
    laws: ["G4: Causality", "G5: Transparency", "G6: Authenticity"]
