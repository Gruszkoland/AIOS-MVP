# ADRION 369 — Alembic configuration for micro-saas billing DB
# Supports: SQLite (dev) + PostgreSQL (prod) via DATABASE_URL env var

[alembic]
# Path to migration scripts, relative to this file's directory
script_location = migrations

# Disable file-level logging in alembic.ini — env.py sets up Python logging
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Disable version_locations; single linear history
# version_locations =

# Output encoding
output_encoding = utf-8

# sqlalchemy.url is intentionally OMITTED — env.py reads DATABASE_URL at runtime
# to support SQLite in dev and PostgreSQL in prod from a single config.

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
