# OAuth Configuration Reference for ADRION 369
# Automatically integrated with Roo Code analysis via roo.rules.json

oauth_config_version = "1.0"
created_date = "2026-04-08"

[servers.genesis]
name = "Genesis Record MCP Server"
scopes = [
    "mcp://genesis.adrion/read.record",
    "mcp://genesis.adrion/write.record"
]
token_expiration_hours = 24
requires_rotation = true
storage_backend = "encrypted-env"
audit_logging = true

[servers.guardian]
name = "Guardian Audit Server"
scopes = [
    "mcp://guardian.adrion/audit"
]
token_expiration_hours = 24
requires_rotation = true
storage_backend = "encrypted-env"
audit_logging = true

[servers.healer]
name = "Healer Agent Server"
scopes = [
    "mcp://healer.adrion/health.check",
    "mcp://healer.adrion/identity.reset"
]
token_expiration_hours = 12
requires_rotation = true
storage_backend = "encrypted-env"
audit_logging = true

[servers.vortex]
name = "Vortex Data Transform Server"
scopes = [
    "mcp://vortex.adrion/data.transform"
]
token_expiration_hours = 24
requires_rotation = true
storage_backend = "encrypted-env"
audit_logging = true

[servers.oracle]
name = "Oracle LLM Query Server"
scopes = [
    "mcp://oracle.adrion/model.query"
]
token_expiration_hours = 24
requires_rotation = true
storage_backend = "encrypted-env"
audit_logging = true

[servers.router]
name = "Router Agent Control Server"
scopes = [
    "mcp://router.adrion/routing.control"
]
token_expiration_hours = 24
requires_rotation = true
storage_backend = "encrypted-env"
audit_logging = true

[global_settings]
# Token rotation margin (refresh token 1 hour before expiry)
rotation_margin_hours = 1

# Encryption settings
encryption_algorithm = "AES-256-GCM"
key_derivation = "PBKDF2"
iterations = 100000

# Audit logging
audit_log_path = "Genesis Record/10_RAPORTY_DZIALANIA_SYSTEMU/oauth_audit.jsonl"
audit_retention_days = 30
audit_log_rotation = true

# Compliance
guardian_laws_enforced = ["G1", "G2", "G3", "G4", "G5", "G6", "G7", "G8", "G9"]
privacy_standard = "GDPR"
quarterly_audit_required = true

[security_rules]
# Maps to roo.rules.json SEC-008 through SEC-012
sec_008_enabled = true  # OAuth Scope Validation
sec_009_enabled = true  # Missing Token Rotation
sec_010_enabled = true  # Unencrypted Token Storage
sec_011_enabled = true  # Missing Scope Audit Logging
sec_012_enabled = true  # App Data Folder Leakage

[hidden_data_folders]
# Documented application data folders (compliant with G7-Privacy)
"/roo_cache" = "Code analysis temporary cache (24h TTL, auto-cleanup)"
"/.aider" = "Aider conversation history (user-deletable)"
"/Genesis Record" = "Audit logs and session reports (30d retention)"

[token_storage_backends]
# Supported secure storage mechanisms
"encrypted-env" = "Encrypted environment variables"
"system-keyring" = "OS system keyring (macOS/Linux/Windows)"
"aws-secretsmanager" = "AWS Secrets Manager"
"hashicorp-vault" = "HashiCorp Vault"
"azure-keyvault" = "Azure Key Vault"

[compliance_checklist]
all_mcp_servers_oauth_configured = false  # Set to true after configuration
scopes_documented = false
token_expiration_configured = false
token_rotation_implemented = false
tokens_encrypted_at_rest = false
audit_logging_active = false
hidden_folders_documented = false
roo_code_security_passes = false
security_profile_analysis_passes = false
oauth_consent_screen_reviewed = false
quarterly_audit_scheduled = false
