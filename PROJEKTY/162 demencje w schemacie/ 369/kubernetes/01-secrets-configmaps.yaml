---
# ADRION 369 — Kubernetes Secrets
# Przechowuje hasła, klucze API, JWT sekrety
# UWAGA: W produkcji użyj external secret store (Vault, AWS Secrets Manager)
apiVersion: v1
kind: Secret
metadata:
  name: adrion-secrets
  namespace: adrion
type: Opaque
stringData:
  POSTGRES_USER: adrion
  POSTGRES_PASSWORD: "CHANGE_ME_MIN_32_CHARS_RANDOM"  # ← ZMIEŃ
  POSTGRES_DB: genesis_record
  PG_USER: adrion
  PG_PASSWORD: "CHANGE_ME_MIN_32_CHARS_RANDOM"  # ← ZMIEŃ
  UAP_API_KEY: "CHANGE_ME_MIN_32_CHARS_RANDOM"  # ← ZMIEŃ
  JWT_SECRET: "CHANGE_ME_MIN_32_CHARS_RANDOM"  # ← ZMIEŃ
  DRM_HMAC_SECRET: "CHANGE_ME_MIN_32_CHARS_RANDOM"  # ← ZMIEŃ
  PGADMIN_DEFAULT_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"  # ← ZMIEŃ

---
# ADRION 369 — Kubernetes ConfigMap
# Przechowuje zmienne środowiskowe i konfiguracje
apiVersion: v1
kind: ConfigMap
metadata:
  name: adrion-config
  namespace: adrion
data:
  ENVIRONMENT: "production"
  DB_ENGINE: "postgresql"
  POSTGRES_INITDB_ARGS: "--encoding=UTF8"
  PG_HOST: "postgres.adrion.svc.cluster.local"
  PG_PORT: "5432"
  MAPI_PORT: "8002"
  MAPI_HOST: "0.0.0.0"
  LOG_LEVEL: "INFO"
  PYTHONIOENCODING: "utf-8"
  PYTHONUNBUFFERED: "1"
  # LLM Backend
  LLM_BACKEND: "ollama"
  OLLAMA_URL: "http://ollama.adrion.svc.cluster.local:11434"
  OLLAMA_TIMEOUT_SECONDS: "120"
  # Health checks
  HEALTH_CHECK_INTERVAL_SECONDS: "30"
  SERVICE_RESTART_ATTEMPTS: "5"
  # Database pool
  DB_POOL_MIN: "5"
  DB_POOL_MAX: "20"
  DB_CONN_TIMEOUT: "15"
  DB_CONN_RETRIES: "3"
  # Monitoring
  RETENTION_DAYS: "90"
