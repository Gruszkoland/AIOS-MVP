---
# ADRION 369 — pgAdmin Deployment (Optional - Database Management UI)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: adrion
  labels:
    app: pgadmin
    optional: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      securityContext:
        runAsUser: 5050
        fsGroup: 5050
      containers:
      - name: pgadmin
        image: dpage/pgadmin4:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: PGADMIN_DEFAULT_EMAIL
          value: "admin@example.com"
        - name: PGADMIN_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: adrion-secrets
              key: PGADMIN_DEFAULT_PASSWORD
        - name: PGADMIN_CONFIG_SERVER_MODE
          value: "False"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /misc/ping
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /misc/ping
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10

---
# Service pgAdmin
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: adrion
spec:
  type: ClusterIP
  selector:
    app: pgadmin
  ports:
  - name: http
    port: 5050
    targetPort: 80

---
# HorizontalPodAutoscaler dla Backend
# Automatycznie skaluje replicas bazując na CPU/Memory
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uap-backend-hpa
  namespace: adrion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uap-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Scale up jeśli avg CPU > 70%
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80  # Scale up jeśli avg memory > 80%
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
# HorizontalPodAutoscaler dla Frontend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uap-frontend-hpa
  namespace: adrion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uap-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85

---
# PodDisruptionBudget dla Backend (cluster maintenance)
# Zapewnia minimum 1 pod dostępny podczas disruptions
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: uap-backend-pdb
  namespace: adrion
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: uap-backend

---
# PodDisruptionBudget dla Frontend
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: uap-frontend-pdb
  namespace: adrion
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: uap-frontend

---
# NetworkPolicy — restrict traffic
# Tylko backend może łączyć się z PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: adrion-network-policy
  namespace: adrion
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx  # Ingress Controller
    - podSelector:
        matchLabels:
          app: uap-backend
    - podSelector:
        matchLabels:
          app: uap-frontend

---
# PostgreSQL connection policy (allow only backend)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: adrion
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: uap-backend
    ports:
    - protocol: TCP
      port: 5432
