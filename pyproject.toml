[tool.coverage.run]
source = ["arbitrage"]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "arbitrage/schema_wholesale.sql",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 80

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]
