version: "3.8"

# ═══════════════════════════════════════════════════════════════════════════════
# ADRION 369 — COMPLETE PRODUCTION ORCHESTRATION STACK (162D)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Fully integrated Docker Compose with all 11 services, proper dependencies,
# healthchecks, networks, volumes, and environment synchronization.
#
# SERVICES (in initialization order):
#   1. postgres          — Genesis Record database (dependency root)
#   2. loki              — Log aggregation system
#   3. promtail          — Log shipper (depends on loki)
#   4. ollama            — Local LLM engine (standalone)
#   5. alert-handler     — Slack/Pagerduty webhook handler
#   6. n8n               — Workflow orchestration (SAP) → depends on postgres
#   7. vortex-engine     — 174Hz harmonic orchestration → depends on postgres
#   8. adrion-healer     — Self-healing daemon → depends on postgres
#   9. adrion-api        — Main API (arbitrage engine)
#  10. adrion-backup     — Backup automation → depends on alert-handler
#  11. grafana           — Monitoring dashboard → depends on loki, alert-handler
#  12. adrion-nginx      — Reverse proxy (ingress layer) → depends on all APIs
#
# Usage:
#   docker-compose -f docker-compose-orchestration.yml up -d              # Start all
#   docker-compose -f docker-compose-orchestration.yml ps                 # Status
#   docker-compose -f docker-compose-orchestration.yml logs -f grafana    # Follow logs
#   docker-compose -f docker-compose-orchestration.yml down               # Stop all
#
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ═════════════════════════════════════════════════════════════════════════════
  # TIER 0: DATABASE FOUNDATION (all other services depend on this)
  # ═════════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:15-alpine
    container_name: adrion-postgres
    networks:
      - adrion-backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adrion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adrion_pass_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-genesis_record}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C --lc-collate=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-adrion} -d ${POSTGRES_DB:-genesis_record}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "{{.ImageName}}|{{.Name}}"

  # ═════════════════════════════════════════════════════════════════════════════
  # TIER 1: LOG INFRASTRUCTURE (observability foundation)
  # ═════════════════════════════════════════════════════════════════════════════

  loki:
    image: grafana/loki:3.1.1
    container_name: adrion-loki
    networks:
      - adrion-backend
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "-O",
          "/dev/null",
          "http://localhost:3100/ready",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}"

  promtail:
    image: grafana/promtail:3.1.1
    container_name: adrion-promtail
    networks:
      - adrion-backend
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./monitoring/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp/promtail
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}"

  # ═════════════════════════════════════════════════════════════════════════════
  # TIER 1: CORE AI/ML ENGINE (isolated from main services)
  # ═════════════════════════════════════════════════════════════════════════════

  ollama:
    image: ollama/ollama:latest
    container_name: adrion-ollama
    networks:
      - adrion-backend
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-4}
      OLLAMA_NUM_GPU: ${OLLAMA_NUM_GPU:-1}
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "4"
    # GPU support — uncomment deploy.resources.reservations if NVIDIA GPU available:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}"

  # ═════════════════════════════════════════════════════════════════════════════
  # TIER 2: ALERT & MONITORING INFRASTRUCTURE
  # ═════════════════════════════════════════════════════════════════════════════

  alert-handler:
    build:
      context: .
      dockerfile: Dockerfile.alert-handler
    container_name: adrion-alert-handler
    networks:
      - adrion-backend
    env_file:
      - .env
    environment:
      HANDLER_PORT: 8090
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAGERDUTY_KEY: ${PAGERDUTY_KEY:-}
      ALERT_LOG_PATH: /app/logs/alerts.log
    ports:
      - "8090:8090"
    volumes:
      - ./monitoring/alerts:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}"

  # ═════════════════════════════════════════════════════════════════════════════
  # TIER 2: WORKFLOW ORCHESTRATION (SAP — Synchronous Action Protocol)
  # ═════════════════════════════════════════════════════════════════════════════

  n8n:
    image: n8nio/n8n:latest
    container_name: adrion-n8n
    networks:
      - adrion-backend
      - adrion-frontend
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_ADMIN_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_ADMIN_PASSWORD:-change_in_production}
      WEBHOOK_URL: http://localhost:5678/
      N8N_LICENSE_ACTIVATION_KEY: ${N8N_LICENSE_KEY:-}
      N8N_ENDPOINT_WEBHOOK: webhook
      N8N_ENDPOINT_WEBHOOK_TEST: webhook-test
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-genesis_record}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-adrion}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-adrion_pass_change_in_prod}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change_me_to_random_string_32_chars}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/n8n-workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "{{.ImageName}}"

  # ═════════════════════════════════════════════════════════════════════════════
  # TIER 2: HARMONIC ORCHESTRATION (Vortex 174Hz Engine)
  # ═════════════════════════════════════════════════════════════════════════════

  vortex-engine:
    build:
      context: .
      dockerfile: Dockerfile.vortex
    container_name: adrion-vortex
    networks:
      - adrion-backend
      - adrion-frontend
    ports:
      - "1740:1740"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-adrion}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-adrion_pass_change_in_prod}
      DB_NAME: ${POSTGRES_DB:-genesis_record}
      VORTEX_PORT: "1740"
      VORTEX_PULSE_HZ: "174"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "-O",
          "/dev/null",
          "http://localhost:1740/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.75"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}"

  # ═════════════════════════════════════════════════════════════════════════════
  # TIER 2: SELF-HEALING DAEMON (Healer Persona)
  # ═════════════════════════════════════════════════════════════════════════════

  adrion-healer:
    build:
      context: .
      dockerfile: Dockerfile.healer
    container_name: adrion-healer
    networks:
      - adrion-backend
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-adrion}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-adrion_pass_change_in_prod}
      DB_NAME: ${POSTGRES_DB:-genesis_record}
      HEALER_INTERVAL_SECONDS: "300"
      MONITOR_SERVICES: "postgres,n8n,vortex-engine,adrion-api"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys; sys.exit(0)'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}"

  # ═════════════════════════════════════════════════════════════════════════════
  # TIER 3: APPLICATION SERVICES (APIs)
  # ═════════════════════════════════════════════════════════════════════════════

  adrion-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adrion-api
    networks:
      - adrion-backend
      - adrion-frontend
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/arbitrage.db
      LLM_BACKEND: ${LLM_BACKEND:-ollama}
      OLLAMA_URL: http://ollama:11434
      API_PORT: "8001"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./arbitrage:/app/arbitrage:ro
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/arbitrage/status', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "{{.ImageName}}"

  # ═════════════════════════════════════════════════════════════════════════════
  # TIER 3: BACKUP & DATA PROTECTION
  # ═════════════════════════════════════════════════════════════════════════════

  adrion-backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: adrion-backup
    networks:
      - adrion-backend
    env_file:
      - .env
    environment:
      DB_PATH: /app/data/arbitrage.db
      BACKUP_DIR: /backups
      ALERT_URL: http://alert-handler:8090/alert
      BACKUP_CRON: "0 3 * * *"
    volumes:
      - ./data:/app/data:ro
      - ./backups:/backups
      - ./scripts/backups/backup-sqlite.sh:/usr/local/bin/backup-sqlite.sh:ro
    depends_on:
      alert-handler:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}"

  # ═════════════════════════════════════════════════════════════════════════════
  # TIER 3: MONITORING DASHBOARD (Grafana)
  # ═════════════════════════════════════════════════════════════════════════════

  grafana:
    image: grafana/grafana:11.1.4
    container_name: adrion-grafana
    networks:
      - adrion-backend
      - adrion-frontend
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_in_production}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DATE_FORMAT: "YYYY-MM-DD HH:mm:ss"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
      GF_ALERTING_MAX_ANNOTATIONS_TO_KEEP: "100"
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      alert-handler:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: adrion-prometheus
    networks:
      - adrion-backend
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "-O",
          "/dev/null",
          "http://localhost:9090/-/ready",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}"

  # ═════════════════════════════════════════════════════════════════════════════
  # TIER 4: INGRESS LAYER (Reverse Proxy)
  # ═════════════════════════════════════════════════════════════════════════════

  adrion-nginx:
    image: nginx:1.27-alpine
    container_name: adrion-nginx
    networks:
      - adrion-frontend
    environment:
      NGINX_HOST: ${NGINX_HOST:-localhost}
      NGINX_PORT: ${NGINX_PORT:-80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./config/nginx/certs:/etc/nginx/certs:ro
    command: >
      /bin/sh -c
      "envsubst '$$NGINX_HOST,$$NGINX_PORT' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
       && nginx -g 'daemon off;'"
    depends_on:
      adrion-api:
        condition: service_healthy
      n8n:
        condition: service_healthy
      grafana:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "-O",
          "/dev/null",
          "http://localhost:80/",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}"

# ═════════════════════════════════════════════════════════════════════════════════
# NETWORKS (logical isolation & security boundaries)
# ═════════════════════════════════════════════════════════════════════════════════

networks:
  adrion-backend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-adrion-backend
    ipam:
      config:
        - subnet: 172.20.0.0/16

  adrion-frontend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-adrion-frontend
    ipam:
      config:
        - subnet: 172.21.0.0/16

# ═════════════════════════════════════════════════════════════════════════════════
# VOLUMES (persistent data storage)
# ═════════════════════════════════════════════════════════════════════════════════

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgres

  loki_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/loki

  promtail_positions:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/promtail

  ollama_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/ollama

  n8n_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/n8n

  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/grafana

  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/prometheus
